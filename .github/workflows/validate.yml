name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install tooling
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck jq

      - name: Validate registry.json
        run: |
          jq -e 'has("plugins") and (.plugins | type == "array")' registry.json
          for name in $(jq -r '.plugins[].name' registry.json); do
            jq -e --arg n "$name" '.plugins[] | select(.name == $n) | all(.name, .version, .description, .download_url, .category; type == "string")' registry.json
          done

      - name: Validate every plugin manifest
        run: |
          fail=0
          for f in plugins/*/plugin.json; do
            if ! jq -e 'has("name") and has("entry_point") and has("type") and has("version") and has("description") and has("category")' "$f" >/dev/null; then
              echo "::error file=$f::missing required field"
              fail=1
            fi
          done
          exit $fail

      - name: Plugin name must match directory and registry entry
        run: |
          fail=0
          for d in plugins/*/; do
            dirname=$(basename "$d")
            manifest_name=$(jq -r '.name' "$d/plugin.json")
            if [ "$dirname" != "$manifest_name" ]; then
              echo "::error::folder $dirname has plugin.json.name = $manifest_name"; fail=1
            fi
            if ! jq -e --arg n "$dirname" '.plugins[] | select(.name == $n)' registry.json >/dev/null; then
              echo "::error::plugin $dirname not listed in registry.json"; fail=1
            fi
          done
          exit $fail

      - name: Validate Go plugins (build + vet)
        run: |
          fail=0
          for d in plugins/*/; do
            if [ -f "$d/main.go" ]; then
              name=$(basename "$d")
              echo "▶ $name"
              (cd "$d" && go vet ./... && go build -o "$name" .) || fail=1
              rm -f "$d/$name"
            fi
          done
          exit $fail

      - name: Validate script plugins (entry exists)
        run: |
          fail=0
          for d in plugins/*/; do
            ptype=$(jq -r '.type' "$d/plugin.json")
            entry=$(jq -r '.entry_point' "$d/plugin.json")
            case "$ptype" in
              script|python)
                if [ ! -f "$d$entry" ]; then
                  echo "::error::missing entry_point $d$entry"
                  fail=1
                fi
                ;;
              binary)
                if [ ! -f "$d/main.go" ]; then
                  echo "::error::$d type=binary but no main.go"
                  fail=1
                fi
                ;;
            esac
          done
          exit $fail

      - name: Shellcheck bash plugins
        run: |
          for d in plugins/*/; do
            ptype=$(jq -r '.type' "$d/plugin.json")
            if [ "$ptype" = "script" ]; then
              find "$d" -name '*.sh' -print0 | xargs -0 shellcheck -S warning -e SC1090,SC1091,SC2086,SC2155 || true
            fi
          done

  # Triggered by a per-plugin tag like "cpc-v2.0.0": build that one plugin's
  # bundle (linux/amd64) and upload it as the release asset registry.json
  # points at. One plugin per its own tag.
  release:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      - name: Build plugin bundle
        run: |
          set -euo pipefail
          tag=${GITHUB_REF#refs/tags/}
          # Tag form: <name>-v<version>  (e.g. cpc-v2.0.0)
          name=${tag%-v*}
          version=${tag##*-v}
          dir="plugins/$name"

          [ -d "$dir" ] || { echo "::error::no plugin dir for tag $tag ($dir)"; exit 1; }
          manifest_version=$(jq -r '.version' "$dir/plugin.json")
          if [ "$version" != "$manifest_version" ]; then
            echo "::error::tag version $version != plugin.json version $manifest_version for $name"
            exit 1
          fi

          ptype=$(jq -r '.type' "$dir/plugin.json")
          entry=$(jq -r '.entry_point' "$dir/plugin.json")

          # Stage the bundle contents at the root of a staging dir, because the
          # cmnds downloader extracts the tarball flat into ~/.cmnds/plugins/<name>/.
          stage=$(mktemp -d)
          cp "$dir/plugin.json" "$stage/"

          case "$ptype" in
            binary)
              echo "Building $name (linux/amd64)..."
              (cd "$dir" && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o "$stage/$entry" .)
              chmod +x "$stage/$entry"
              ;;
            script|python)
              # Copy every source file except the manifest (already staged) so
              # multi-file script plugins (templates, helpers) ship intact.
              (cd "$dir" && find . -type f ! -name plugin.json -exec cp --parents {} "$stage/" \;)
              [ -f "$stage/$entry" ] || { echo "::error::entry_point $entry missing after staging"; exit 1; }
              chmod +x "$stage/$entry" || true
              ;;
            *)
              echo "::error::unknown plugin type '$ptype'"; exit 1 ;;
          esac

          mkdir -p releases
          tar -czf "releases/${name}-${version}.tar.gz" -C "$stage" .
          echo "Built releases/${name}-${version}.tar.gz:"
          tar -tzf "releases/${name}-${version}.tar.gz"

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag=${GITHUB_REF#refs/tags/}
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" releases/*.tar.gz --clobber
          else
            gh release create "$tag" releases/*.tar.gz --title "$tag" --generate-notes
          fi
