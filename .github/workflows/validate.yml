name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install tooling
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck jq

      - name: Validate registry.json
        run: |
          jq -e 'has("plugins") and (.plugins | type == "array")' registry.json
          for name in $(jq -r '.plugins[].name' registry.json); do
            jq -e --arg n "$name" '.plugins[] | select(.name == $n) | all(.name, .version, .description, .download_url, .category; type == "string")' registry.json
          done

      - name: Validate every plugin manifest
        run: |
          fail=0
          for f in plugins/*/plugin.json; do
            if ! jq -e 'has("name") and has("entry_point") and has("type") and has("version") and has("description") and has("category")' "$f" >/dev/null; then
              echo "::error file=$f::missing required field"
              fail=1
            fi
          done
          exit $fail

      - name: Plugin name must match directory and registry entry
        run: |
          fail=0
          for d in plugins/*/; do
            dirname=$(basename "$d")
            manifest_name=$(jq -r '.name' "$d/plugin.json")
            if [ "$dirname" != "$manifest_name" ]; then
              echo "::error::folder $dirname has plugin.json.name = $manifest_name"; fail=1
            fi
            if ! jq -e --arg n "$dirname" '.plugins[] | select(.name == $n)' registry.json >/dev/null; then
              echo "::error::plugin $dirname not listed in registry.json"; fail=1
            fi
          done
          exit $fail

      - name: Validate Go plugins (build + vet)
        run: |
          fail=0
          for d in plugins/*/; do
            if [ -f "$d/main.go" ]; then
              name=$(basename "$d")
              echo "▶ $name"
              (cd "$d" && go vet ./... && go build -o "$name" .) || fail=1
              rm -f "$d/$name"
            fi
          done
          exit $fail

      - name: Validate script plugins (entry exists)
        run: |
          fail=0
          for d in plugins/*/; do
            ptype=$(jq -r '.type' "$d/plugin.json")
            entry=$(jq -r '.entry_point' "$d/plugin.json")
            case "$ptype" in
              script|python)
                if [ ! -f "$d$entry" ]; then
                  echo "::error::missing entry_point $d$entry"
                  fail=1
                fi
                ;;
              binary)
                if [ ! -f "$d/main.go" ]; then
                  echo "::error::$d type=binary but no main.go"
                  fail=1
                fi
                ;;
            esac
          done
          exit $fail

      - name: Shellcheck bash plugins
        run: |
          for d in plugins/*/; do
            ptype=$(jq -r '.type' "$d/plugin.json")
            if [ "$ptype" = "script" ]; then
              find "$d" -name '*.sh' -print0 | xargs -0 shellcheck -S warning -e SC1090,SC1091,SC2086,SC2155 || true
            fi
          done

  release:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    strategy:
      matrix:
        os: [linux]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq
      - name: Build bundles
        env:
          CMNDS_BUILD_OS: ${{ matrix.os }}
          CMNDS_BUILD_ARCH: ${{ matrix.arch }}
        run: bash scripts/build-bundles.sh
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=${GITHUB_REF#refs/tags/}
          gh release upload "$tag" releases/*.tar.gz --clobber || gh release create "$tag" releases/*.tar.gz --title "$tag" --generate-notes
